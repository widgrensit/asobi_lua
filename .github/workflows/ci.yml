name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@dc560fbe8e4e39898dd808645fc1d3e69d248429  # main as of 2026-03-31, pinned via Dependabot
    permissions:
      contents: write
      pull-requests: write
    with:
      otp-version: '28.0.1'
      rebar3-version: '3.27.0'
      enable-audit: true
      # GHSA-g2wm-735q-3f56 (LOW, cowlib cookie/1) has no upstream patch and
      # does not apply: asobi_lua only reaches cowlib via cowboy. Tracked
      # alongside the cowboy 2.15.0 bump that closes GHSA-jfc2-q6qh-g5x8.
      audit-ignores: 'GHSA-g2wm-735q-3f56'
      enable-dependency-submission: true
      enable-summary: true
    secrets: inherit
