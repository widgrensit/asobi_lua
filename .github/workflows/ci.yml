name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@559dea550228fb7042813f6b6359addec11bedcf  # main as of 2026-05-20, pinned via Dependabot
    permissions:
      contents: write
      pull-requests: write
    with:
      otp-version: '28.0.1'
      rebar3-version: '3.27.0'
      enable-audit: true
      # GHSA-g2wm-735q-3f56 (LOW, cowlib cookie/1) has no upstream patch and
      # does not apply: asobi_lua does not call cow_cookie:cookie/1.
      # Tracked in docs/security_audit_2026_05_19.md.
      audit-ignores: 'GHSA-g2wm-735q-3f56'
      enable-dependency-submission: true
      enable-summary: true
    secrets: inherit
