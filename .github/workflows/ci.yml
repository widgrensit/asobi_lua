name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@dc560fbe8e4e39898dd808645fc1d3e69d248429  # main as of 2026-03-31, pinned via Dependabot
    permissions:
      contents: write
      pull-requests: write
    with:
      otp-version: '28.0.1'
      rebar3-version: '3.27.0'
      enable-audit: true
      enable-dependency-submission: true
      enable-summary: true
    secrets: inherit
