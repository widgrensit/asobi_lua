name: Nightly

on:
  schedule:
    - cron: '15 3 * * *'  # 03:15 UTC daily — staggered after asobi nightly
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  property-soak:
    name: Property Tests (high numtests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROPER_NUMTESTS: '1000'
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28.0.1'
          rebar3-version: '3.27.0'

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: nightly-prop-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            nightly-prop-

      - name: Run property tests at high numtests
        run: |
          rebar3 eunit --module=\
          prop_lua_bridge_input_threading,\
          prop_lua_error_containment

  notify-failure:
    name: Open regression issue
    needs: [property-soak]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const title = `Nightly failure: ${new Date().toISOString().slice(0,10)}`;
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Nightly workflow failed.\n\nRun: ${url}\n\nThis issue is auto-opened by \`.github/workflows/nightly.yml\`.`,
              labels: ['nightly-regression']
            });
